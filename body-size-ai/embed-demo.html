<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Cửa Hàng Thời Trang Bên Thứ Ba</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        .header { background: #333; color: white; padding: 1rem; text-align: center; }
        .product-page { display: flex; max-width: 1000px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .product-image { flex: 1; background: #eee; min-height: 300px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #999; }
        .product-info { flex: 1; padding-left: 2rem; }
        .btn { padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; margin-top: 10px; }
        .btn-buy { background: #e74c3c; color: white; width: 100%; font-size: 1.2rem; }
        .btn-ai { background: linear-gradient(135deg, #8e44ad, #2980b9); color: white; display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 20px; width: 100%; }
        
        /* Modal Overlay cho Widget */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: transparent; width: 90%; max-width: 1200px; height: 90vh;
            border-radius: 12px; position: relative;
        }
        .close-btn {
            position: absolute; top: 10px; right: 10px; background: white; border: none;
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold;
        }
        iframe { width: 100%; height: 100%; border: none; border-radius: 12px; background: transparent; }
        
        #result-box { margin-top: 20px; padding: 15px; background: #e8f5e9; border: 1px solid #4caf50; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>My Custom Shop (Website Bên Thứ 3)</h1>
    </div>

    <div class="product-page">
        <div class="product-image">
            [Ảnh Sản Phẩm Áo Thun]
        </div>
        <div class="product-info">
            <h2>Áo Thun Nam Cao Cấp</h2>
            <p style="color: #e74c3c; font-size: 1.5rem; font-weight: bold;">350.000 VNĐ</p>
            <p>Mô tả: Áo thun nam chất liệu cotton 100%, thoáng mát, thấm hút mồ hôi tốt.</p>
            
            <div style="margin: 20px 0;">
                <label for="size-select"><strong>Chọn Size:</strong></label>
                <select id="size-select" style="padding: 8px; font-size: 1rem; margin-left: 10px;">
                    <option value="">-- Vui lòng chọn size --</option>
                    <option value="S">Size S</option>
                    <option value="M">Size M</option>
                    <option value="L">Size L</option>
                    <option value="XL">Size XL</option>
                </select>
            </div>

            <button class="btn btn-buy" onclick="alert('Đã thêm vào giỏ hàng!')">Thêm Vào Giỏ Hàng</button>

            <!-- Nút gọi Widget AI của bạn -->
            <button class="btn btn-ai" onclick="openAIWidget()">
                ✨ Không biết chọn size? Hỏi AI ngay!
            </button>

            <div id="result-box"></div>
        </div>
    </div>

    <!-- Modal chứa iframe nhúng Body Size AI -->
    <div class="modal-overlay" id="ai-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeAIWidget()">X</button>
            <!-- 
                URL gọi iframe: Trỏ về server FastAPI của bạn (port 8000).
                Truyền thêm tham số: ?garment=shirt&brand=generic&region=asia để tự động cấu hình form bên trong widget
            -->
            <iframe id="ai-iframe" src=""></iframe>
        </div>
    </div>

    <script>
        function openAIWidget() {
            const modal = document.getElementById('ai-modal');
            const iframe = document.getElementById('ai-iframe');
            
            // Cấu hình URL của Widget (trỏ về FastAPI đang chạy ở port 8000)
            // Truyền param để Widget biết đang gợi ý cho "Áo" (shirt)
            iframe.src = "http://127.0.0.1:8000/?garment=shirt&brand=generic&region=asia";
            modal.style.display = 'flex';
        }

        function closeAIWidget() {
            document.getElementById('ai-modal').style.display = 'none';
            document.getElementById('ai-iframe').src = "";
        }

        // Lắng nghe sự kiện postMessage từ iframe truyền ra ngoài
        window.addEventListener('message', function(event) {
            // Xác minh nguồn gốc (origin) để bảo mật (ở đây ta chấp nhận localhost:8000)
            if (event.origin !== "http://127.0.0.1:8000") return;

            const data = event.data;
            if (data && data.type === 'BODY_SIZE_AI_RESULT') {
                console.log("Đã nhận kết quả từ AI:", data.result);
                
                // Đóng modal
                closeAIWidget();

                // Hiển thị kết quả lên giao diện web bên thứ 3
                const resultBox = document.getElementById('result-box');
                resultBox.style.display = 'block';
                
                let recommendedSize = "";
                if (data.garmentType === 'shirt' && data.result.shirt_size) {
                    recommendedSize = data.result.shirt_size.recommended_size;
                } else if (data.result.predicted_size) {
                    recommendedSize = data.result.predicted_size;
                }

                resultBox.innerHTML = `
                    <h4 style="margin-top:0; color: #2e7d32;">✨ AI đã chọn size cho bạn!</h4>
                    <p>Size đề xuất: <strong>${recommendedSize}</strong></p>
                    <p>Tự động áp dụng vào giỏ hàng...</p>
                `;

                // Tự động chọn size trong dropdown
                const select = document.getElementById('size-select');
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === recommendedSize) {
                        select.selectedIndex = i;
                        break;
                    }
                }
            }
        });
    </script>
</body>
</html>
